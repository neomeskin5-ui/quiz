<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Choate English 단어 퀴즈</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(150deg, #1a1a2e, #16213e, #0f3460);
    font-family: Georgia, serif;
    color: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 16px;
  }
  .screen { width: 100%; max-width: 560px; animation: fadeIn .4s ease; }
  .hidden { display: none !important; }
  h1 {
    color: #FFB703; font-size: 1.7rem; margin: 8px 0 4px;
    letter-spacing: 1.5px; text-shadow: 0 0 24px rgba(255,183,3,0.4);
  }
  .subtitle { color: #8899aa; margin: 0 0 2px; font-size: 0.95rem; }
  .count { color: #556677; font-size: 0.78rem; margin-bottom: 14px; }
  .center { text-align: center; }
  .voice-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; font-size: 0.76rem; }
  .voice-row label { color: #8899aa; white-space: nowrap; }
  select {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 7px 10px;
    color: #fff; font-family: inherit; font-size: 0.78rem;
    outline: none;
  }
  select option { background: #1a1a2e; }
  .test-btn {
    background: rgba(255,183,3,0.12);
    border: 1px solid rgba(255,183,3,0.35);
    border-radius: 8px; padding: 6px 12px;
    color: #FFB703; cursor: pointer; font-size: 0.72rem;
    font-family: inherit;
  }
  .chapter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  @media (min-width: 500px) {
    .chapter-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .chapter-card {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px 10px;
    cursor: pointer; text-align: left;
    transition: all .2s;
    position: relative;
    color: #ccd; font-family: inherit;
    font-size: 0.78rem;
  }
  .chapter-card.selected {
    background: rgba(255,183,3,0.12);
    border-color: #FFB703;
    color: #fff;
    box-shadow: 0 0 16px rgba(255,183,3,0.2);
  }
  .chapter-card .ch-title { font-weight: bold; margin-bottom: 3px; font-size: 0.82rem; }
  .chapter-card .ch-count { color: #778899; font-size: 0.7rem; }
  .chapter-card.selected .ch-count { color: #ffd34d; }
  .chapter-card .check {
    position: absolute; top: 8px; right: 8px;
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    background: rgba(0,0,0,0.2);
  }
  .chapter-card.selected .check {
    background: #FFB703;
    border-color: #FFB703;
    color: #1a1a2e;
    font-weight: bold;
  }
  .select-actions {
    display: flex; gap: 8px; margin-bottom: 16px; justify-content: center;
  }
  .mini-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 6px 14px;
    color: #aabbcc; cursor: pointer;
    font-size: 0.75rem; font-family: inherit;
  }
  .mini-btn:hover { background: rgba(255,255,255,0.1); }
  .selected-count {
    text-align: center; color: #FFB703; font-size: 0.85rem;
    margin-bottom: 14px; font-weight: bold;
  }
  .btn-primary {
    background: linear-gradient(135deg, #FFB703, #e85d04);
    color: #1a1a2e; font-weight: bold; letter-spacing: 0.5px;
    border: none; border-radius: 50px;
    padding: 14px 44px; font-size: 1rem;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 24px rgba(255,183,3,0.35);
  }
  .btn-primary:disabled {
    background: rgba(255,255,255,0.1); color: #556677;
    box-shadow: none; cursor: not-allowed;
  }
  .btn-primary.full { border-radius: 12px; padding: 13px; width: 100%; }
  .btn-outline {
    background: transparent; border: 2px solid currentColor;
    border-radius: 50px; padding: 11px 32px;
    font-size: 0.95rem; font-weight: bold;
    cursor: pointer; font-family: inherit;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
  .chip { border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; font-family: monospace; border: 1px solid; }
  .chip.gold { color: #FFB703; border-color: rgba(255,183,3,0.4); background: rgba(255,183,3,0.12); }
  .chip.green { color: #81c784; border-color: rgba(129,199,132,0.4); background: rgba(129,199,132,0.12); }
  .chip.home {
    color: #8899aa; border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); cursor: pointer;
  }
  .progress {
    height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 2px; margin-bottom: 20px; overflow: hidden;
  }
  .progress .bar {
    height: 100%; background: linear-gradient(90deg, #FFB703, #e85d04);
    border-radius: 2px; transition: width 0.3s;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 22px; padding: 28px 20px;
    text-align: center; transition: all 0.3s;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .card.ok { background: rgba(76,175,80,0.12); border-color: rgba(76,175,80,0.55); box-shadow: 0 0 40px rgba(76,175,80,0.2); }
  .card.ng { background: rgba(229,57,53,0.11); border-color: rgba(229,57,53,0.55); box-shadow: 0 0 40px rgba(229,57,53,0.2); }
  .prompt { color: #8899aa; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 10px; }
  .word { color: #fff; font-weight: bold; font-size: 2.1rem; margin-bottom: 18px; line-height: 1.2; }
  .word.long { font-size: 1.4rem; }
  .word.vlong { font-size: 1.1rem; }
  .speaker {
    background: rgba(255,183,3,0.1); border: 2px solid #FFB703;
    border-radius: 50px; padding: 12px 32px;
    color: #FFB703; font-size: 1.05rem; cursor: pointer;
    font-family: inherit; margin-bottom: 22px; min-width: 180px;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  }
  .speaker.playing { background: rgba(255,183,3,0.3); }
  .speaker .icon { display: inline-block; }
  .speaker.playing .icon { animation: pulse 0.6s ease-in-out infinite alternate; }
  input[type="text"] {
    width: 100%; background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 13px 14px;
    font-size: 1.05rem; color: #fff; outline: none;
    text-align: center; font-family: inherit;
    margin-bottom: 10px; -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: #445566; }
  input[type="text"]:focus { border-color: rgba(255,183,3,0.5); }
  .feedback-icon { font-size: 44px; margin-bottom: 4px; }
  .feedback-title { font-size: 1.3rem; font-weight: bold; }
  .feedback-title.ok { color: #81c784; }
  .feedback-title.ng { color: #e57373; font-size: 1rem; }
  .feedback-answer { color: #ff8a65; font-size: 1.15rem; font-weight: bold; margin: 4px 0; }
  .feedback-answer.ok { color: #4caf50; font-size: 0.9rem; margin: 6px 0 18px; }
  .feedback-note { color: #556677; font-size: 0.72rem; margin-bottom: 18px; }
  .stats { display: flex; justify-content: center; gap: 28px; margin-top: 18px; }
  .stat { text-align: center; }
  .stat .n { font-size: 1.25rem; font-weight: bold; }
  .stat .l { color: #445566; font-size: 0.68rem; }
  .done-stats { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .done-stat {
    background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 12px 14px; text-align: center; min-width: 68px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .done-stat .n { font-size: 1.4rem; font-weight: bold; }
  .done-stat .l { color: #445566; font-size: 0.66rem; margin-top: 2px; }

  /* ── Special "frequently wrong" card ── */
  .special-card {
    background: linear-gradient(135deg, rgba(229,57,53,0.1), rgba(255,107,0,0.06));
    border: 2px solid rgba(229,57,53,0.35);
  }
  .special-card .ch-title { color: #ff8a65; }
  .special-card.selected {
    background: linear-gradient(135deg, rgba(229,57,53,0.22), rgba(255,107,0,0.16));
    border-color: #ff6b00;
    box-shadow: 0 0 18px rgba(229,57,53,0.25);
  }
  .special-card.selected .ch-title { color: #fff; }
  .special-card.disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.1);
  }
  .special-card.disabled .ch-title { color: #667788; }
  .special-card .reset-x {
    position: absolute; top: 6px; right: 6px;
    width: 20px; height: 20px;
    border: 1px solid rgba(229,57,53,0.4);
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #ff8a65; font-size: 0.7rem;
    cursor: pointer; z-index: 2;
  }
  .special-card .reset-x:hover { background: rgba(229,57,53,0.3); }

  /* ── Pronunciation test ── */
  .btn-row {
    display: flex; gap: 8px;
    justify-content: center; align-items: center;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .speaker, .pron-btn { margin-bottom: 0 !important; }
  .pron-btn {
    background: rgba(100,181,246,0.08);
    border: 2px solid #64b5f6;
    border-radius: 50px; padding: 10px 22px;
    color: #64b5f6; font-size: 0.95rem;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .2s;
  }
  .pron-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pron-btn.listening {
    background: rgba(229,57,53,0.2);
    border-color: #e57373;
    color: #e57373;
    animation: listen-pulse 1.1s ease-in-out infinite;
  }
  @keyframes listen-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(229,57,53,0); }
  }
  .pron-result {
    background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 10px 14px;
    margin: 0 0 16px;
    font-size: 0.85rem; text-align: center;
    color: #aabbcc;
    animation: fadeIn .3s ease;
  }
  .pron-result.perfect { background: rgba(76,175,80,0.18); color: #81c784; }
  .pron-result.good { background: rgba(255,183,3,0.15); color: #FFB703; }
  .pron-result.close { background: rgba(255,152,0,0.15); color: #ffb74d; }
  .pron-result.bad { background: rgba(229,57,53,0.15); color: #e57373; }
  .pron-result .big { font-size: 1.5rem; display: block; margin-bottom: 4px; }
  .pron-result .heard {
    display: block; margin-top: 4px; font-size: 0.75rem;
    color: #8899aa; font-style: italic;
  }

  /* ── Korean voice answer ── */
  .answer-row {
    display: flex; gap: 8px; align-items: stretch;
  }
  .answer-mic-btn {
    background: rgba(129,199,132,0.1);
    border: 2px solid #81c784;
    border-radius: 12px;
    padding: 0 16px;
    color: #81c784;
    font-size: 1.3rem;
    cursor: pointer;
    min-width: 56px;
    font-family: inherit;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .answer-mic-btn:hover { background: rgba(129,199,132,0.2); }
  .answer-mic-btn.listening {
    background: rgba(229,57,53,0.25);
    border-color: #e57373;
    color: #e57373;
    animation: listen-pulse 1.1s ease-in-out infinite;
  }
  .answer-mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-in-row {
    flex: 1 1 auto;
    border-radius: 12px !important;
    padding: 13px !important;
    width: auto !important;
  }
  .voice-status {
    text-align: center; font-size: 0.78rem;
    color: #e57373; margin: -4px 0 8px;
    animation: fadeIn .2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.35); } }
</style>
</head>
<body>

<div id="intro" class="screen center">
  <div style="font-size: 42px;">🍫</div>
  <h1>Choate English</h1>
  <p class="subtitle">단어 퀴즈</p>
  <p class="count">영어 발음을 듣고 한국어 뜻 맞추기</p>

  <div class="voice-row">
    <label>🔈 음성:</label>
    <select id="voice-select"></select>
    <button class="test-btn" id="test-voice">🔊 테스트</button>
  </div>

  <p style="color:#556677; font-size:0.72rem; margin:-4px 0 14px; line-height:1.5;">
    💡 🎤 버튼을 처음 누르면 마이크 권한을 허용해주세요.<br>
    퀴즈 중엔 브라우저 탭에 마이크 아이콘이 켜져 있어요 (권한 유지를 위해).
  </p>

  <p style="color:#aabbcc; font-size:0.82rem; margin:14px 0 10px; font-weight:bold;">📚 공부할 챕터 선택</p>

  <div class="select-actions">
    <button class="mini-btn" id="select-all-btn">전체 선택</button>
    <button class="mini-btn" id="clear-all-btn">전체 해제</button>
  </div>

  <div class="chapter-grid" id="chapter-grid"></div>

  <div class="selected-count" id="selected-count">0개 단어 선택됨</div>

  <button class="btn-primary" id="start-btn" disabled>퀴즈 시작 →</button>
</div>

<div id="quiz" class="screen hidden">
  <div class="topbar">
    <div class="chip home" id="home-btn">← 홈</div>
    <div class="chip gold" id="round-chip">R1</div>
    <span style="color:#6677aa; font-size:0.8rem;"><span id="pos"></span> / <span id="qtotal"></span></span>
    <div class="chip green" id="correct-chip">✓ 0</div>
  </div>
  <div class="progress"><div class="bar" id="bar" style="width:0%"></div></div>

  <div class="card" id="card">
    <p class="prompt">이 단어의 한국어 뜻은?</p>
    <div class="word" id="word"></div>
    <div class="btn-row">
      <button class="speaker" id="speaker">
        <span class="icon">🔊</span>
        <span id="speaker-text">발음 듣기</span>
      </button>
      <button class="pron-btn" id="pron-btn" title="영어 발음 테스트">
        <span>🎤</span>
        <span id="pron-btn-text">발음 테스트</span>
      </button>
    </div>
    <div id="pron-result" class="pron-result hidden"></div>

    <div id="input-area">
      <input type="text" id="answer" placeholder="한국어로 입력 (또는 🎤 말하기)" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="voice-status" class="voice-status hidden"></div>
      <div class="answer-row">
        <button class="answer-mic-btn" id="answer-mic" title="한국어로 말해서 답하기">🎤</button>
        <button class="btn-primary submit-in-row" id="submit-btn">확인 ✓</button>
      </div>
    </div>

    <div id="feedback-area" class="hidden"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" style="color:#8899aa" id="s-attempts">0</div><div class="l">시도</div></div>
    <div class="stat"><div class="n" style="color:#81c784" id="s-correct">0</div><div class="l">정답</div></div>
    <div class="stat"><div class="n" style="color:#e57373" id="s-wrong">0</div><div class="l">오답</div></div>
  </div>
</div>

<div id="done" class="screen center hidden">
  <div style="font-size: 52px;">🏆</div>
  <h1>완벽해요!</h1>
  <p class="subtitle" style="margin-bottom: 24px;">모든 단어를 다 맞췄습니다!</p>
  <div class="done-stats" id="done-stats"></div>
  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <button class="btn-outline" style="color:#8899aa" id="home-btn-2">← 챕터 선택</button>
    <button class="btn-primary" id="restart-btn">다시 시작 🔄</button>
  </div>
</div>

<script>
// (생략 없이 원본 데이터 유지)
const CHAPTERS = [
  {
    id: "ch17-18",
    title: "Chocolate Factory Ch. 17, 18",

      { en: "untouched", ko: ["훼손되지 않은", "손대지 않은"] },

      { en: "barrel", ko: ["통", "배럴"] },
      { en: "disaster", ko: ["재해", "재난", "재앙", "불행"] },

      { en: "marvellous", ko: ["기막히게 좋은", "경탄할 만한", "훌륭한"] },

      { en: "tummy", ko: ["배"] },

    ]
  },
  {
    id: "ch19-20",
    title: "Chocolate Factory Ch. 19, 20",
    words: [
      { en: "invent", ko: ["발명하다"] },
      { en: "oar", ko: ["배를 움직이는 노", "노"] },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[m][n];
}

const KOREAN_PARTICLES = ["에서", "에게", "으로", "부터", "까지", "을", "를", "이", "가", "은", "는", "에", "의", "와", "과", "도", "만", "로"];
function stripKoreanParticles(s) {
  return s.split(/\s+/).map(w => {
    for (const p of KOREAN_PARTICLES) {
      if (w.length > p.length && w.endsWith(p)) return w.slice(0, -p.length);
    }
    return w;
  }).join("");
}

// (KOREAN_SYNONYMS 데이터 중략)
const KOREAN_SYNONYMS = [
  ["배", "복부", "뱃속", "위"], ["해골", "두개골", "뼈대", "골격"], ["가슴", "흉부", "유방"],
  ["거대한", "엄청난", "큰", "커다란", "어마어마한", "굉장히 큰"], ["멋진", "훌륭한", "굉장한", "좋은", "끝내주는"]
];

const _synonymMap = (() => {
  const map = new Map();
  KOREAN_SYNONYMS.forEach(group => {
    const set = new Set(group);
    group.forEach(w => {
      const key = w.replace(/\s/g, "");
      if (!map.has(key)) map.set(key, new Set());
      set.forEach(s => map.get(key).add(s));
    });
  });
  return map;
})();

function getSynonyms(word) {
  const key = word.replace(/\s/g, "");
  return _synonymMap.get(key) || new Set([word]);
}

function checkAnswer(input, correctList) {
  const clean = s => s.replace(/\s/g, "").toLowerCase();
  const cleanStripped = s => clean(stripKoreanParticles(s));
  const inp = clean(input);
  const inpStripped = cleanStripped(input);
  if (!inp) return false;
  const expanded = new Set();
  correctList.forEach(ans => {
    expanded.add(ans);
    getSynonyms(ans).forEach(s => expanded.add(s));
  });
  for (const ans of expanded) {
    const a = clean(ans);
    const aStripped = cleanStripped(ans);
    if (a.includes(inp) || inp.includes(a)) return true;
    if (aStripped.includes(inpStripped) || inpStripped.includes(aStripped)) return true;
    const longer = Math.max(aStripped.length, inpStripped.length);
    const shorter = Math.min(aStripped.length, inpStripped.length);
    if (shorter >= 3) {
      const dist = levenshtein(aStripped, inpStripped);
      if (dist / longer <= 0.22) return true;
    }
  }
  return false;
}

function getWrongWords() {

  const list = [];
  Object.keys(m).forEach(en => {

      list.push({ word: wordMap[en], score: stats.wrong - stats.correct, lastWrong: stats.lastWrong || 0 });

  list.sort((a, b) => b.score - a.score || b.lastWrong - a.lastWrong);

}

  const ctx = getAudioCtx(); const arpeggio = [{ f: 523.25, t: 0.0 }, { f: 659.25, t: 0.1 }, { f: 783.99, t: 0.2 }, { f: 1046.5, t: 0.3 }];
  arpeggio.forEach(({ f, t }) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain(); const t0 = ctx.currentTime + t;
    osc.type = "triangle"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0, t0); gain.gain.linearRampToValueAtTime(0.18, t0 + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(t0); osc.stop(t0 + 0.3);
  });
}

// ── TTS (Autoplay 정책 우회 포함) ──
let allVoices = [];
function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  const enVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith("en"));
  const select = document.getElementById("voice-select");
  select.innerHTML = "";
  const gopt = document.createElement("option"); gopt.value = "google-tts"; gopt.textContent = "🌐 Google Translate (온라인)"; select.appendChild(gopt);
  enVoices.forEach(v => { const opt = document.createElement("option"); opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`; select.appendChild(opt); });
  const best = enVoices.find(v => v.name === "Google US English") || enVoices.find(v => v.name.includes("Samantha")) || enVoices.find(v => v.lang === "en-US");
  if (best) { select.value = best.name; state.selectedVoice = best; } else { state.selectedVoice = "google-tts"; }
}
document.getElementById("voice-select").addEventListener("change", e => {
  const val = e.target.value; state.selectedVoice = (val === "google-tts") ? "google-tts" : allVoices.find(v => v.name === val);
});

let currentAudio = null, speakTimeout = null;
function setSpeaking(on) {
  const btn = document.getElementById("speaker"), txt = document.getElementById("speaker-text");
  if (btn) btn.classList.toggle("playing", on); if (txt) txt.textContent = on ? "재생 중..." : "발음 듣기";
}
function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (speakTimeout) clearTimeout(speakTimeout);
  setSpeaking(true);
  speakTimeout = setTimeout(() => setSpeaking(false), 6000);
  const done = () => { clearTimeout(speakTimeout); setSpeaking(false); };
  if (state.selectedVoice === "google-tts") { playGoogleTTS(text, done); return; }
  const synth = window.speechSynthesis;
  if (!synth || !state.selectedVoice) { playGoogleTTS(text, done); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US"; utt.voice = state.selectedVoice; utt.rate = 0.85;
  utt.onend = done; utt.onerror = done;
  synth.speak(utt);
}
function playGoogleTTS(text, onDone) {
  const enc = encodeURIComponent(text);
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${enc}&tl=en-US&client=tw-ob`;
  const a = new Audio(url); currentAudio = a; a.onended = onDone; a.onerror = onDone;
  a.play().catch(onDone);
}

// ── 음성 인식 (STT) ──
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognitionActive = false, _persistentRec = null, _nextResultHandler = null, _currentRecLang = null;

// [수정] HTTPS 환경에 최적화된 마이크 권한 처리
let _micPermissionReady = false, _liveMicStream = null;
async function ensureMicPermission() {
  _micPermissionReady = true;
  return true; 
}
function releaseMic() { _liveMicStream = null; _micPermissionReady = false; }

async function ensurePersistentRec() {
  if (_persistentRec) return _persistentRec;
  if (!SpeechRec) return null;
  const rec = new SpeechRec();
  rec.continuous = true; rec.interimResults = false; rec.maxAlternatives = 3; rec.lang = "en-US";
  rec.onresult = (e) => {
    if (!_nextResultHandler) return;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (!e.results[i].isFinal) continue;
      const alts = [];
      for (let j = 0; j < e.results[i].length; j++) alts.push({ transcript: e.results[i][j].transcript });
      const h = _nextResultHandler; _nextResultHandler = null; h(alts, null); return;
    }
  };
  rec.onend = () => { if (_persistentRec === rec) setTimeout(() => { try { rec.start(); } catch(e){} }, 100); };
  _persistentRec = rec; try { rec.start(); } catch(e){} return rec;
}

async function listenWith(lang, handler) {
  const rec = await ensurePersistentRec(); if (!rec) { handler(null, "no-support"); return; }
  _nextResultHandler = handler;
  if (_currentRecLang !== lang) { _currentRecLang = lang; rec.lang = lang; try { rec.stop(); } catch(e){} }
}
function cancelListening() { _nextResultHandler = null; }
function supportsPronunciationTest() { return !!SpeechRec; }

// ... (gradePronunciation, setPronBtn, showPronResult 등 UI 로직 유지) ...
function normalizeForCompare(s) { return s.toLowerCase().replace(/[^a-z\s]/g, "").replace(/\s+/g, " ").trim(); }
function gradePronunciation(heard, target) {
  const h = normalizeForCompare(heard), t = normalizeForCompare(target);
  if (!h) return { level: "bad", label: "소리를 못 들었어요", emoji: "🔇" };
  if (h === t) return { level: "perfect", label: "완벽해요!", emoji: "💯" };
  const ratio = levenshtein(h, t) / Math.max(t.length, 1);
  if (ratio <= 0.2) return { level: "good", label: "아주 좋아요!", emoji: "👍" };
  if (ratio <= 0.4) return { level: "close", label: "비슷해요", emoji: "🎯" };
  return { level: "bad", label: "다시 시도해보세요", emoji: "🔄" };
}
function setPronBtn(state) {
  const btn = document.getElementById("pron-btn"), txt = document.getElementById("pron-btn-text");
  if (!btn) return; btn.classList.toggle("listening", state === "listening");
  txt.textContent = state === "listening" ? "듣는 중..." : "발음 테스트";
}
function showPronResult(html, level) {
  const el = document.getElementById("pron-result"); el.className = `pron-result ${level || ""}`;
  el.innerHTML = html; el.classList.remove("hidden");
}
function hidePronResult() { const el = document.getElementById("pron-result"); if (el) el.classList.add("hidden"); }

async function startPronunciationTest() {
  if (!supportsPronunciationTest()) { showPronResult("⚠️ 지원하지 않는 브라우저입니다.", "bad"); return; }
  if (recognitionActive) { cancelListening(); recognitionActive = false; setPronBtn("idle"); return; }
  const word = state.queue[state.idx]; if (!word) return;
  hidePronResult(); recognitionActive = true; setPronBtn("listening");
  listenWith("en-US", (alts, err) => {
    recognitionActive = false; setPronBtn("idle");
    if (err) { showPronResult("⚠️ 오류가 발생했습니다.", "bad"); return; }
    let best = null;
    alts.forEach(alt => {
      const grade = gradePronunciation(alt.transcript, word.en);
      if (!best || (gradeRank(grade.level) > gradeRank(best.grade.level))) best = { transcript: alt.transcript, grade };
    });
    showPronResult(`<span class="big">${best.grade.emoji}</span>${best.grade.label}<span class="heard">"${best.transcript}"</span>`, best.grade.level);
  });
}
function gradeRank(l) { return { perfect: 4, good: 3, close: 2, bad: 1 }[l] || 0; }

// ── Korean Answer ──
function showVoiceStatus(text, isError) {
  const el = document.getElementById("voice-status"); if (!el) return;
  el.textContent = text; el.style.color = isError ? "#e57373" : "#81c784"; el.classList.remove("hidden");
}
function setAnswerMic(listening) {
  const btn = document.getElementById("answer-mic"); if (!btn) return;
  btn.classList.toggle("listening", listening); btn.innerHTML = listening ? "🔴" : "🎤";
}
async function startKoreanAnswer() {
  if (!SpeechRec) { showVoiceStatus("⚠️ 지원하지 않음", true); return; }
  if (state.feedback || recognitionActive) { cancelListening(); recognitionActive = false; setAnswerMic(false); return; }
  recognitionActive = true; setAnswerMic(true); showVoiceStatus("🎤 듣고 있어요...", false);
  listenWith("ko-KR", (alts, err) => {
    recognitionActive = false; setAnswerMic(false);
    if (err) { showVoiceStatus("⚠️ 오류", true); return; }
    const word = state.queue[state.idx];
    let best = alts[0].transcript;
    alts.forEach(alt => { if (checkAnswer(alt.transcript, word.ko)) best = alt.transcript; });
    document.getElementById("answer").value = best;
    showVoiceStatus(`들린 말: "${best}"`, false);
    setTimeout(() => { if (!state.feedback) submit(); }, 500);
  });
}

// ── Quiz Flow ──
function renderChapterGrid() {
  const grid = document.getElementById("chapter-grid"); grid.innerHTML = "";
  const wrongWords = getWrongWords();
  const specialCard = document.createElement("button");
  specialCard.className = `chapter-card special-card ${wrongWords.length === 0 ? 'disabled' : ''} ${state.selectedChapterIds.has("__mistakes__") ? 'selected' : ''}`;
  specialCard.innerHTML = `<div class="check">${state.selectedChapterIds.has("__mistakes__") ? "✓" : ""}</div><div class="ch-title">🔥 자주 틀린 단어</div><div class="ch-count">${wrongWords.length}개</div>`;
  specialCard.onclick = () => { if (wrongWords.length > 0) { state.selectedChapterIds.has("__mistakes__") ? state.selectedChapterIds.delete("__mistakes__") : state.selectedChapterIds.add("__mistakes__"); renderChapterGrid(); updateSelectedCount(); } };
  grid.appendChild(specialCard);
  CHAPTERS.forEach(ch => {
    const card = document.createElement("button"); card.className = `chapter-card ${state.selectedChapterIds.has(ch.id) ? 'selected' : ''}`;
    card.innerHTML = `<div class="check">${state.selectedChapterIds.has(ch.id) ? "✓" : ""}</div><div class="ch-title">${ch.title}</div><div class="ch-count">${ch.words.length}개</div>`;
    card.onclick = () => { state.selectedChapterIds.has(ch.id) ? state.selectedChapterIds.delete(ch.id) : state.selectedChapterIds.add(ch.id); renderChapterGrid(); updateSelectedCount(); };
    grid.appendChild(card);
  });
}
function updateSelectedCount() {
  let total = 0;
  if (state.selectedChapterIds.has("__mistakes__")) total += getWrongWords().length;
  CHAPTERS.filter(c => state.selectedChapterIds.has(c.id)).forEach(c => total += c.words.length);
  document.getElementById("selected-count").textContent = `${total}개 선택됨`;
  document.getElementById("start-btn").disabled = total === 0;
}
function startQuiz() {
  const words = []; const seen = new Set();
  if (state.selectedChapterIds.has("__mistakes__")) getWrongWords().forEach(w => { if (!seen.has(w.en)) { seen.add(w.en); words.push(w); } });
  CHAPTERS.filter(c => state.selectedChapterIds.has(c.id)).forEach(c => c.words.forEach(w => { if (!seen.has(w.en)) { seen.add(w.en); words.push(w); } }));
  state.queue = shuffle(words); state.idx = 0; state.wrongs = new Set(); state.correct = 0; state.attempts = 0; state.round = 1; state.feedback = null;
  show("quiz"); render(); speak(state.queue[0].en);
}
function render() {
  const word = state.queue[state.idx]; if (!word) return;
  document.getElementById("pos").textContent = state.idx + 1; document.getElementById("qtotal").textContent = state.queue.length;
  document.getElementById("word").textContent = word.en;
  document.getElementById("s-attempts").textContent = state.attempts; document.getElementById("s-correct").textContent = state.correct;
  document.getElementById("bar").style.width = `${(state.idx / state.queue.length) * 100}%`;
  const inputArea = document.getElementById("input-area"), fbArea = document.getElementById("feedback-area"), card = document.getElementById("card");
  card.className = "card";
  if (!state.feedback) {
    inputArea.classList.remove("hidden"); fbArea.classList.add("hidden"); document.getElementById("answer").value = "";
    setTimeout(() => document.getElementById("answer").focus(), 100);
  } else {
    inputArea.classList.add("hidden"); fbArea.classList.remove("hidden"); card.classList.add(state.feedback);
    const isLast = state.idx + 1 >= state.queue.length;
    fbArea.innerHTML = `<div><div class="feedback-title ${state.feedback === 'ok' ? 'ok' : 'ng'}">${state.feedback === 'ok' ? '정답!' : '틀렸어요!'}</div><div class="feedback-answer">${word.ko.join(" / ")}</div><button class="btn-outline" id="next-btn">${isLast ? "결과 보기" : "다음"}</button></div>`;
    document.getElementById("next-btn").onclick = nextQuestion;
  }
}
function submit() {
  if (state.feedback) return;
  const val = document.getElementById("answer").value.trim(); if (!val) return;
  const word = state.queue[state.idx]; const ok = checkAnswer(val, word.ko);
  state.attempts++; recordResult(word.en, ok);
  if (ok) { state.correct++; state.feedback = "ok"; playCorrectSound(); } else { state.wrongs.add(word.en); state.feedback = "ng"; playWrongSound(); }
  render();
}
function nextQuestion() {
  if (state.idx + 1 >= state.queue.length) {
    const nextQ = state.queue.filter(w => state.wrongs.has(w.en));
    if (nextQ.length === 0) { showDone(); return; }
    state.queue = shuffle(nextQ); state.idx = 0; state.wrongs = new Set(); state.round++; state.feedback = null;
  } else { state.idx++; state.feedback = null; }
  render(); speak(state.queue[state.idx].en);
}
function showDone() { show("done"); playFanfare(); }
function goHome() { releaseMic(); show("intro"); renderChapterGrid(); }

// [수정] 모바일 정책 대응 이벤트 리스너
document.getElementById("start-btn").onclick = () => {
  if (window.speechSynthesis) {
    const wakeUp = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(wakeUp);
  }
  startQuiz();
};

document.getElementById("submit-btn").onclick = submit;
document.getElementById("answer").onkeydown = e => { if (e.key === "Enter") submit(); };
document.getElementById("home-btn").onclick = goHome;
document.getElementById("home-btn-2").onclick = goHome;
document.getElementById("speaker").onclick = () => { if (state.queue[state.idx]) speak(state.queue[state.idx].en); };
document.getElementById("pron-btn").onclick = startPronunciationTest;
document.getElementById("answer-mic").onclick = startKoreanAnswer;
document.getElementById("test-voice").onclick = () => speak("Test");

renderChapterGrid(); updateSelectedCount();
if (window.speechSynthesis) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
</script>
