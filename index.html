<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Choate English 단어 퀴즈</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(150deg, #1a1a2e, #16213e, #0f3460);
    font-family: Georgia, serif;
    color: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 16px;
  }
  .screen { width: 100%; max-width: 560px; animation: fadeIn .4s ease; }
  .hidden { display: none !important; }
  h1 {
    color: #FFB703; font-size: 1.7rem; margin: 8px 0 4px;
    letter-spacing: 1.5px; text-shadow: 0 0 24px rgba(255,183,3,0.4);
  }
  .subtitle { color: #8899aa; margin: 0 0 2px; font-size: 0.95rem; }
  .count { color: #556677; font-size: 0.78rem; margin-bottom: 14px; }
  .center { text-align: center; }
  .voice-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; font-size: 0.76rem; }
  .voice-row label { color: #8899aa; white-space: nowrap; }
  select {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 7px 10px;
    color: #fff; font-family: inherit; font-size: 0.78rem;
    outline: none;
  }
  select option { background: #1a1a2e; }
  .test-btn {
    background: rgba(255,183,3,0.12);
    border: 1px solid rgba(255,183,3,0.35);
    border-radius: 8px; padding: 6px 12px;
    color: #FFB703; cursor: pointer; font-size: 0.72rem;
    font-family: inherit;
  }
  .chapter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  @media (min-width: 500px) {
    .chapter-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .chapter-card {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px 10px;
    cursor: pointer; text-align: left;
    transition: all .2s;
    position: relative;
    color: #ccd; font-family: inherit;
    font-size: 0.78rem;
  }
  .chapter-card.selected {
    background: rgba(255,183,3,0.12);
    border-color: #FFB703;
    color: #fff;
    box-shadow: 0 0 16px rgba(255,183,3,0.2);
  }
  .chapter-card .ch-title { font-weight: bold; margin-bottom: 3px; font-size: 0.82rem; }
  .chapter-card .ch-count { color: #778899; font-size: 0.7rem; }
  .chapter-card.selected .ch-count { color: #ffd34d; }
  .chapter-card .check {
    position: absolute; top: 8px; right: 8px;
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    background: rgba(0,0,0,0.2);
  }
  .chapter-card.selected .check {
    background: #FFB703;
    border-color: #FFB703;
    color: #1a1a2e;
    font-weight: bold;
  }
  .select-actions {
    display: flex; gap: 8px; margin-bottom: 16px; justify-content: center;
  }
  .mini-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 6px 14px;
    color: #aabbcc; cursor: pointer;
    font-size: 0.75rem; font-family: inherit;
  }
  .mini-btn:hover { background: rgba(255,255,255,0.1); }
  .selected-count {
    text-align: center; color: #FFB703; font-size: 0.85rem;
    margin-bottom: 14px; font-weight: bold;
  }
  .btn-primary {
    background: linear-gradient(135deg, #FFB703, #e85d04);
    color: #1a1a2e; font-weight: bold; letter-spacing: 0.5px;
    border: none; border-radius: 50px;
    padding: 14px 44px; font-size: 1rem;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 24px rgba(255,183,3,0.35);
  }
  .btn-primary:disabled {
    background: rgba(255,255,255,0.1); color: #556677;
    box-shadow: none; cursor: not-allowed;
  }
  .btn-primary.full { border-radius: 12px; padding: 13px; width: 100%; }
  .btn-outline {
    background: transparent; border: 2px solid currentColor;
    border-radius: 50px; padding: 11px 32px;
    font-size: 0.95rem; font-weight: bold;
    cursor: pointer; font-family: inherit;
  }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
  .chip { border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; font-family: monospace; border: 1px solid; }
  .chip.gold { color: #FFB703; border-color: rgba(255,183,3,0.4); background: rgba(255,183,3,0.12); }
  .chip.green { color: #81c784; border-color: rgba(129,199,132,0.4); background: rgba(129,199,132,0.12); }
  .chip.home {
    color: #8899aa; border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); cursor: pointer;
  }
  .progress {
    height: 3px; background: rgba(255,255,255,0.08);
    border-radius: 2px; margin-bottom: 20px; overflow: hidden;
  }
  .progress .bar {
    height: 100%; background: linear-gradient(90deg, #FFB703, #e85d04);
    border-radius: 2px; transition: width 0.3s;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 22px; padding: 28px 20px;
    text-align: center; transition: all 0.3s;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .card.ok { background: rgba(76,175,80,0.12); border-color: rgba(76,175,80,0.55); box-shadow: 0 0 40px rgba(76,175,80,0.2); }
  .card.ng { background: rgba(229,57,53,0.11); border-color: rgba(229,57,53,0.55); box-shadow: 0 0 40px rgba(229,57,53,0.2); }
  .prompt { color: #8899aa; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 10px; }
  .word { color: #fff; font-weight: bold; font-size: 2.1rem; margin-bottom: 18px; line-height: 1.2; }
  .word.long { font-size: 1.4rem; }
  .word.vlong { font-size: 1.1rem; }
  .speaker {
    background: rgba(255,183,3,0.1); border: 2px solid #FFB703;
    border-radius: 50px; padding: 12px 32px;
    color: #FFB703; font-size: 1.05rem; cursor: pointer;
    font-family: inherit; margin-bottom: 22px; min-width: 180px;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  }
  .speaker.playing { background: rgba(255,183,3,0.3); }
  .speaker .icon { display: inline-block; }
  .speaker.playing .icon { animation: pulse 0.6s ease-in-out infinite alternate; }
  input[type="text"] {
    width: 100%; background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 13px 14px;
    font-size: 1.05rem; color: #fff; outline: none;
    text-align: center; font-family: inherit;
    margin-bottom: 10px; -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: #445566; }
  input[type="text"]:focus { border-color: rgba(255,183,3,0.5); }
  .feedback-icon { font-size: 44px; margin-bottom: 4px; }
  .feedback-title { font-size: 1.3rem; font-weight: bold; }
  .feedback-title.ok { color: #81c784; }
  .feedback-title.ng { color: #e57373; font-size: 1rem; }
  .feedback-answer { color: #ff8a65; font-size: 1.15rem; font-weight: bold; margin: 4px 0; }
  .feedback-answer.ok { color: #4caf50; font-size: 0.9rem; margin: 6px 0 18px; }
  .feedback-note { color: #556677; font-size: 0.72rem; margin-bottom: 18px; }
  .stats { display: flex; justify-content: center; gap: 28px; margin-top: 18px; }
  .stat { text-align: center; }
  .stat .n { font-size: 1.25rem; font-weight: bold; }
  .stat .l { color: #445566; font-size: 0.68rem; }
  .done-stats { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .done-stat {
    background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 12px 14px; text-align: center; min-width: 68px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .done-stat .n { font-size: 1.4rem; font-weight: bold; }
  .done-stat .l { color: #445566; font-size: 0.66rem; margin-top: 2px; }

  /* ── Special "frequently wrong" card ── */
  .special-card {
    background: linear-gradient(135deg, rgba(229,57,53,0.1), rgba(255,107,0,0.06));
    border: 2px solid rgba(229,57,53,0.35);
  }
  .special-card .ch-title { color: #ff8a65; }
  .special-card.selected {
    background: linear-gradient(135deg, rgba(229,57,53,0.22), rgba(255,107,0,0.16));
    border-color: #ff6b00;
    box-shadow: 0 0 18px rgba(229,57,53,0.25);
  }
  .special-card.selected .ch-title { color: #fff; }
  .special-card.disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.1);
  }
  .special-card.disabled .ch-title { color: #667788; }
  .special-card .reset-x {
    position: absolute; top: 6px; right: 6px;
    width: 20px; height: 20px;
    border: 1px solid rgba(229,57,53,0.4);
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #ff8a65; font-size: 0.7rem;
    cursor: pointer; z-index: 2;
  }
  .special-card .reset-x:hover { background: rgba(229,57,53,0.3); }

  /* ── Pronunciation test ── */
  .btn-row {
    display: flex; gap: 8px;
    justify-content: center; align-items: center;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .speaker, .pron-btn { margin-bottom: 0 !important; }
  .pron-btn {
    background: rgba(100,181,246,0.08);
    border: 2px solid #64b5f6;
    border-radius: 50px; padding: 10px 22px;
    color: #64b5f6; font-size: 0.95rem;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .2s;
  }
  .pron-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pron-btn.listening {
    background: rgba(229,57,53,0.2);
    border-color: #e57373;
    color: #e57373;
    animation: listen-pulse 1.1s ease-in-out infinite;
  }
  @keyframes listen-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(229,57,53,0); }
  }
  .pron-result {
    background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 10px 14px;
    margin: 0 0 16px;
    font-size: 0.85rem; text-align: center;
    color: #aabbcc;
    animation: fadeIn .3s ease;
  }
  .pron-result.perfect { background: rgba(76,175,80,0.18); color: #81c784; }
  .pron-result.good { background: rgba(255,183,3,0.15); color: #FFB703; }
  .pron-result.close { background: rgba(255,152,0,0.15); color: #ffb74d; }
  .pron-result.bad { background: rgba(229,57,53,0.15); color: #e57373; }
  .pron-result .big { font-size: 1.5rem; display: block; margin-bottom: 4px; }
  .pron-result .heard {
    display: block; margin-top: 4px; font-size: 0.75rem;
    color: #8899aa; font-style: italic;
  }

  /* ── Korean voice answer ── */
  .answer-row {
    display: flex; gap: 8px; align-items: stretch;
  }
  .answer-mic-btn {
    background: rgba(129,199,132,0.1);
    border: 2px solid #81c784;
    border-radius: 12px;
    padding: 0 16px;
    color: #81c784;
    font-size: 1.3rem;
    cursor: pointer;
    min-width: 56px;
    font-family: inherit;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .answer-mic-btn:hover { background: rgba(129,199,132,0.2); }
  .answer-mic-btn.listening {
    background: rgba(229,57,53,0.25);
    border-color: #e57373;
    color: #e57373;
    animation: listen-pulse 1.1s ease-in-out infinite;
  }
  .answer-mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-in-row {
    flex: 1 1 auto;
    border-radius: 12px !important;
    padding: 13px !important;
    width: auto !important;
  }
  .voice-status {
    text-align: center; font-size: 0.78rem;
    color: #e57373; margin: -4px 0 8px;
    animation: fadeIn .2s ease;
  }

  /* ── Mic support notice ── */
  .mic-notice {
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.78rem;
    line-height: 1.6;
    text-align: left;
  }
  .mic-notice.ok {
    background: rgba(129,199,132,0.08);
    border: 1px solid rgba(129,199,132,0.25);
    color: #aabbcc;
  }
  .mic-notice.warn {
    background: rgba(255,183,3,0.08);
    border: 1px solid rgba(255,183,3,0.3);
    color: #ffd699;
  }
  .mic-notice b { color: #fff; }
  .mic-notice a {
    color: #64b5f6; text-decoration: underline;
  }
  .mic-notice details {
    margin-top: 8px;
  }
  .mic-notice summary {
    cursor: pointer; color: #64b5f6;
    font-weight: bold; font-size: 0.8rem;
    padding: 4px 0;
    user-select: none;
  }
  .mic-notice summary:hover { color: #90caf9; }
  .mic-notice .steps {
    margin-top: 8px; padding-left: 4px;
    color: #ccd; font-size: 0.76rem;
  }
  .mic-notice code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
    color: #ffd699;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.35); } }
</style>
</head>
<body>

<!-- INTRO / CHAPTER SELECT -->
<div id="intro" class="screen center">
  <div style="font-size: 42px;">🍫</div>
  <h1>Choate English</h1>
  <p class="subtitle">단어 퀴즈</p>
  <p class="count">영어 발음을 듣고 한국어 뜻 맞추기</p>

  <div class="voice-row">
    <label>🔈 음성:</label>
    <select id="voice-select"></select>
    <button class="test-btn" id="test-voice">🔊 테스트</button>
  </div>

  <div id="mic-notice" class="hidden" style="margin: 4px 0 14px;"></div>

  <p style="color:#aabbcc; font-size:0.82rem; margin:14px 0 10px; font-weight:bold;">📚 공부할 챕터 선택</p>

  <div class="select-actions">
    <button class="mini-btn" id="select-all-btn">전체 선택</button>
    <button class="mini-btn" id="clear-all-btn">전체 해제</button>
  </div>

  <div class="chapter-grid" id="chapter-grid"></div>

  <div class="selected-count" id="selected-count">0개 단어 선택됨</div>

  <button class="btn-primary" id="start-btn" disabled>퀴즈 시작 →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen hidden">
  <div class="topbar">
    <div class="chip home" id="home-btn">← 홈</div>
    <div class="chip gold" id="round-chip">R1</div>
    <span style="color:#6677aa; font-size:0.8rem;"><span id="pos"></span> / <span id="qtotal"></span></span>
    <div class="chip green" id="correct-chip">✓ 0</div>
  </div>
  <div class="progress"><div class="bar" id="bar" style="width:0%"></div></div>

  <div class="card" id="card">
    <p class="prompt">이 단어의 한국어 뜻은?</p>
    <div class="word" id="word"></div>
    <div class="btn-row">
      <button class="speaker" id="speaker">
        <span class="icon">🔊</span>
        <span id="speaker-text">발음 듣기</span>
      </button>
      <button class="pron-btn" id="pron-btn" title="영어 발음 테스트">
        <span>🎤</span>
        <span id="pron-btn-text">발음 테스트</span>
      </button>
    </div>
    <div id="pron-result" class="pron-result hidden"></div>

    <div id="input-area">
      <input type="text" id="answer" placeholder="한국어로 입력 (또는 🎤 말하기)" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="voice-status" class="voice-status hidden"></div>
      <div class="answer-row">
        <button class="answer-mic-btn" id="answer-mic" title="한국어로 말해서 답하기">🎤</button>
        <button class="btn-primary submit-in-row" id="submit-btn">확인 ✓</button>
      </div>
    </div>

    <div id="feedback-area" class="hidden"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" style="color:#8899aa" id="s-attempts">0</div><div class="l">시도</div></div>
    <div class="stat"><div class="n" style="color:#81c784" id="s-correct">0</div><div class="l">정답</div></div>
    <div class="stat"><div class="n" style="color:#e57373" id="s-wrong">0</div><div class="l">오답</div></div>
  </div>
</div>

<!-- DONE -->
<div id="done" class="screen center hidden">
  <div style="font-size: 52px;">🏆</div>
  <h1>완벽해요!</h1>
  <p class="subtitle" style="margin-bottom: 24px;">모든 단어를 다 맞췄습니다!</p>
  <div class="done-stats" id="done-stats"></div>
  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <button class="btn-outline" style="color:#8899aa" id="home-btn-2">← 챕터 선택</button>
    <button class="btn-primary" id="restart-btn">다시 시작 🔄</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// VOCABULARY DATA — organized by chapter
// ═══════════════════════════════════════════════════════════════════════════
const CHAPTERS = [
  {
    id: "ch17-18",
    title: "Chocolate Factory Ch. 17, 18",
    words: [
      { en: "untouched", ko: ["훼손되지 않은", "손대지 않은"] },
      { en: "human", ko: ["인간"] },
      { en: "at once", ko: ["즉시", "당장"] },
      { en: "fabulous", ko: ["굉장한", "멋진"] },
      { en: "properly", ko: ["적절하게", "제대로"] },
      { en: "waggle", ko: ["흔들다", "움직이다"] },
      { en: "deaf", ko: ["귀가 먼", "귀머거리"] },
      { en: "lap", ko: ["물을 핥다", "핥다"] },
      { en: "surface", ko: ["표면"] },
      { en: "shriek", ko: ["비명 지르다", "비명소리", "날카로운 소리"] },
      { en: "take off", ko: ["벗다"] },
      { en: "suction", ko: ["빨아들이기", "흡입"] },
      { en: "murder", ko: ["죽이다", "살인"] },
      { en: "smash", ko: ["때려 부수다", "박살내다"] },
      { en: "disappear", ko: ["사라지다"] },
      { en: "keep calm", ko: ["침착해", "침착하다"] },
      { en: "snap", ko: ["딱딱거리다", "툭 쏘다", "쏘듯이 말하다"] },
      { en: "you can say that again", ko: ["정말 그렇다", "맞아", "동의한다", "그렇다"] },
      { en: "barrel", ko: ["통", "배럴"] },
      { en: "disaster", ko: ["재해", "재난", "재앙", "불행"] },
      { en: "forgive", ko: ["용서하다"] },
      { en: "delightful", ko: ["기분 좋은", "기쁜", "마음에 드는"] },
      { en: "off we go", ko: ["출발"] },
      { en: "journey", ko: ["여행"] },
      { en: "burst", ko: ["터지다", "갑자기 나타나다", "파열", "폭발"] },
      { en: "burst into laughter", ko: ["웃음을 터트리다", "웃음이 터지다"] },
      { en: "boil", ko: ["끓다", "삶다"] },
      { en: "glisten", ko: ["반짝이다", "번들거리다"] },
      { en: "bank", ko: ["강둑"] },
      { en: "astonish", ko: ["깜짝 놀라게 하다", "놀라게 하다"] },
      { en: "marvellous", ko: ["기막히게 좋은", "경탄할 만한", "훌륭한"] },
      { en: "sticky", ko: ["끈적끈적한", "끈적한"] },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Levenshtein edit distance (for fuzzy answer matching & pronunciation grading)
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[m][n];
}

// Strip common Korean particles from the end of each whitespace-separated token.
// e.g. "비명을 지르다" → "비명 지르다"  (을 stripped)
const KOREAN_PARTICLES = ["에서", "에게", "으로", "부터", "까지", "을", "를", "이", "가", "은", "는", "에", "의", "와", "과", "도", "만", "로"];
function stripKoreanParticles(s) {
  return s.split(/\s+/).map(w => {
    for (const p of KOREAN_PARTICLES) {
      if (w.length > p.length && w.endsWith(p)) return w.slice(0, -p.length);
    }
    return w;
  }).join("");
}

// Build fast lookup: word → Set of synonym words
const _synonymMap = (() => {
  const map = new Map();
  KOREAN_SYNONYMS.forEach(group => {
    const set = new Set(group);
    group.forEach(w => {
      const key = w.replace(/\s/g, "");
      if (!map.has(key)) map.set(key, new Set());
      set.forEach(s => map.get(key).add(s));
    });
  });
  return map;
})();

function getSynonyms(word) {
  const key = word.replace(/\s/g, "");
  return _synonymMap.get(key) || new Set([word]);
}

function checkAnswer(input, correctList) {
  const clean = s => s.replace(/\s/g, "").toLowerCase();
  const cleanStripped = s => clean(stripKoreanParticles(s));
  const inp = clean(input);
  const inpStripped = cleanStripped(input);
  if (!inp) return false;

  // Expand the correct list with synonyms
  const expanded = new Set();
  correctList.forEach(ans => {
    expanded.add(ans);
    getSynonyms(ans).forEach(s => expanded.add(s));
  });

  for (const ans of expanded) {
    const a = clean(ans);
    const aStripped = cleanStripped(ans);
    // Substring match (both directions, both raw and particle-stripped)
    if (a.includes(inp) || inp.includes(a)) return true;
    if (aStripped.includes(inpStripped) || inpStripped.includes(aStripped)) return true;
    // Fuzzy match via Levenshtein (for typos or conjugation differences)
    const longer = Math.max(aStripped.length, inpStripped.length);
    const shorter = Math.min(aStripped.length, inpStripped.length);
    if (shorter >= 3) {
      const dist = levenshtein(aStripped, inpStripped);
      if (dist / longer <= 0.22) return true;
    }
  }
  return false;
}
function show(id) {
  ["intro", "quiz", "done"].forEach(s => {
    document.getElementById(s).classList.toggle("hidden", s !== id);
  });
}

// Mistake tracking (persists across sessions via localStorage)
// ═══════════════════════════════════════════════════════════════════════════
const MISTAKE_KEY = "choate_vocab_mistakes_v1";

function loadMistakes() {
  try {
    const raw = localStorage.getItem(MISTAKE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveMistakes(m) {
  try { localStorage.setItem(MISTAKE_KEY, JSON.stringify(m)); }
  catch (e) {}
}
function recordResult(wordEn, isCorrect) {
  const m = loadMistakes();
  if (!m[wordEn]) m[wordEn] = { wrong: 0, correct: 0, lastWrong: 0 };
  if (isCorrect) m[wordEn].correct++;
  else { m[wordEn].wrong++; m[wordEn].lastWrong = Date.now(); }
  saveMistakes(m);
}
function getWrongWords() {
  const m = loadMistakes();
  // Build word map from ALL chapters for lookup
  const wordMap = {};
  CHAPTERS.forEach(c => c.words.forEach(w => {
    if (!wordMap[w.en]) wordMap[w.en] = w;
  }));
  // Words that have been wrong at least once AND wrong >= correct
  // (i.e., you still haven't mastered it)
  const list = [];
  Object.keys(m).forEach(en => {
    const stats = m[en];
    if (stats.wrong >= 1 && stats.wrong >= stats.correct && wordMap[en]) {
      list.push({
        word: wordMap[en],
        score: stats.wrong - stats.correct,
        lastWrong: stats.lastWrong || 0,
      });
    }
  });
  // Sort: most wrong first, then most recent wrong

let currentAudio = null, speakTimeout = null;
function setSpeaking(on) {
  const btn = document.getElementById("speaker");
  const txt = document.getElementById("speaker-text");
  if (btn) btn.classList.toggle("playing", on);
  if (txt) txt.textContent = on ? "재생 중..." : "발음 듣기";

function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (speakTimeout) clearTimeout(speakTimeout);
  setSpeaking(true);
  speakTimeout = setTimeout(() => setSpeaking(false), 6000);
  const done = () => { clearTimeout(speakTimeout); setSpeaking(false); };

  // On mobile, Google Translate TTS URL is CORS-blocked. Use Web Speech API only.
  if (state.selectedVoice === "google-tts" && !IS_MOBILE) {
    playGoogleTTS(text, done);
    return;

  const synth = window.speechSynthesis;
  if (!synth) { done(); return; }

  // Mobile Chrome bug: need to cancel() twice and wait a beat before speak()
  synth.cancel();

  const doSpeak = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "en-US";
    if (state.selectedVoice && state.selectedVoice !== "google-tts") {
      utt.voice = state.selectedVoice;
    }
    utt.rate = 0.85; utt.pitch = 1; utt.volume = 1;

    let started = false;
    utt.onstart = () => { started = true; };
    utt.onend = done;
    utt.onerror = (e) => {
      // On desktop, fall back to Google TTS URL if Web Speech fails
      if (!started && !IS_MOBILE) playGoogleTTS(text, done);
      else done();
    };
    try { synth.speak(utt); } catch (e) { done(); }

    // Desktop fallback timer
    if (!IS_MOBILE) {
      setTimeout(() => {
        if (!started) { synth.cancel(); playGoogleTTS(text, done); }
      }, 1500);
    }

  setTimeout(doSpeak, IS_MOBILE ? 100 : 0);

function playGoogleTTS(text, onDone) {
  const enc = encodeURIComponent(text);
  const urls = [
    `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${enc}&tl=en-US&client=gtx`,
    `https://translate.google.com/translate_tts?ie=UTF-8&q=${enc}&tl=en-US&client=tw-ob`,
  ];
  let i = 0;
  const next = () => {
    if (i >= urls.length) { onDone(); return; }
    const a = new Audio(urls[i++]);
    currentAudio = a;
    a.onended = onDone;
    a.onerror = next;
    a.play().catch(next);
  };

// Pronunciation test (Speech Recognition)
// ═══════════════════════════════════════════════════════════════════════════
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognitionActive = false;

// ── Continuous recognition (started ONCE, never stopped until home) ──
// This avoids Chrome's re-prompt on each recognition.start() call on file:// URLs.
let _persistentRec = null;
let _nextResultHandler = null;
let _currentRecLang = null;
let _recInFlight = false;

async function ensurePersistentRec() {
  if (_persistentRec) return _persistentRec;
  if (!SpeechRec) return null;

  const ok = await ensureMicPermission();
  if (!ok) return null;

  const rec = new SpeechRec();
  // On mobile, continuous=true is unreliable — use short-session recognition
  // backed by the persistent MediaStream for permission retention.
  rec.continuous = !IS_MOBILE;
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  rec.lang = "en-US";
  _currentRecLang = "en-US";

  rec.onresult = (e) => {
    if (!_nextResultHandler) return;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (!r.isFinal) continue;
      const alts = [];
      for (let j = 0; j < r.length; j++) {
        alts.push({ transcript: r[j].transcript, confidence: r[j].confidence });
      }
      const h = _nextResultHandler;
      _nextResultHandler = null;
      h(alts, null);
      return;
    }
  };

  rec.onerror = (e) => {
    if (e.error === "no-speech" || e.error === "aborted") return;
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      _micPermissionGranted = false;
      _persistentRec = null;
      if (_nextResultHandler) {
        const h = _nextResultHandler;
        _nextResultHandler = null;
        h(null, e.error);
      }
      return;
    }
    if (_nextResultHandler) {
      const h = _nextResultHandler;
      _nextResultHandler = null;
      h(null, e.error);
    }
  };

  rec.onend = () => {
    // On desktop, continuous=true gives us auto-restart for free, but we still
    // restart just in case. On mobile (continuous=false) we don't auto-restart;
    // each listenWith() call will call start() itself.
    if (!IS_MOBILE && _persistentRec === rec && _micPermissionGranted) {
      setTimeout(() => {
        if (_persistentRec === rec) {
          try { rec.start(); } catch (err) { /* already running */ }
        }
      }, 80);
    }
  };

  _persistentRec = rec;
  // Only start immediately on desktop (continuous mode)
  if (!IS_MOBILE) {
    try { rec.start(); } catch (e) {}
  }
  return rec;
}

async function listenWith(lang, handler) {
  const rec = await ensurePersistentRec();
  if (!rec) { handler(null, "no-support"); return; }
  _nextResultHandler = handler;

  if (IS_MOBILE) {
    // Mobile: explicitly start() each time (continuous=false)
    rec.lang = lang;
    _currentRecLang = lang;
    try {
      rec.start();
    } catch (e) {
      // Already running — stop and retry after a beat
      try { rec.stop(); } catch (e2) {}
      setTimeout(() => {
        try { rec.start(); } catch (e3) { handler(null, "start-failed"); }
      }, 200);
    }
  } else {
    // Desktop: continuous mode is already running; just swap lang if needed
    if (_currentRecLang !== lang) {
      _currentRecLang = lang;
      rec.lang = lang;
      try { rec.stop(); } catch (e) {}
      // onend will auto-restart with new lang
    }
  }
}

// Microphone permission management.
// Strategy: Use the Permissions API to check whether mic permission is already
// granted. If yes, SpeechRecognition will reuse it without re-prompting.
// If not yet granted, call getUserMedia() once to trigger the prompt, then
// immediately release the stream so SpeechRecognition can acquire the mic cleanly.
let _micPermissionGranted = false;

async function checkMicPermission() {
  // Fastest path: use Permissions API if available
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const status = await navigator.permissions.query({ name: "microphone" });
      if (status.state === "granted") {
        _micPermissionGranted = true;
        // Listen for revocation
        status.onchange = () => {
          _micPermissionGranted = (status.state === "granted");
        };
        return "granted";
      }
      if (status.state === "denied") return "denied";
      return "prompt";
    } catch (e) {
      // Permissions API may not support "microphone" in all browsers
    }
  }
  return _micPermissionGranted ? "granted" : "prompt";
}

async function ensureMicPermission() {
  const state = await checkMicPermission();
  if (state === "granted") {
    _micPermissionGranted = true;
    return true;
  }
  if (state === "denied") return false;

  // Need to prompt — call getUserMedia once, then immediately release.
  // This registers the permission grant in the browser's permission store,
  // and SpeechRecognition can re-use it without prompting again.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    _micPermissionGranted = true; // Old browser, hope for the best
    return true;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // Immediately stop — we just needed the grant. SpeechRecognition will
    // open its own stream using the same (now-granted) permission.
    stream.getTracks().forEach(t => t.stop());
    _micPermissionGranted = true;
    return true;
  } catch (e) {
    return false;
  }
}

function normalizeForCompare(s) {
  return s.toLowerCase().replace(/[^a-z\s]/g, "").replace(/\s+/g, " ").trim();
}

function gradePronunciation(heard, target) {
  const h = normalizeForCompare(heard);
  const t = normalizeForCompare(target);
  if (!h) return { level: "bad", label: "소리를 못 들었어요", emoji: "🔇" };
  if (h === t) return { level: "perfect", label: "완벽해요!", emoji: "💯" };
  // Try word-by-word for multi-word phrases
  const dist = levenshtein(h, t);
  const ratio = dist / Math.max(t.length, 1);
  if (ratio <= 0.2) return { level: "good", label: "아주 좋아요!", emoji: "👍" };
  if (ratio <= 0.4) return { level: "close", label: "비슷해요", emoji: "🎯" };
  return { level: "bad", label: "다시 시도해보세요", emoji: "🔄" };
}

async function startPronunciationTest() {
  if (!supportsPronunciationTest()) {
    showPronResult(
      `<span class="big">⚠️</span>이 브라우저는 음성 인식을 지원하지 않아요.<br>Chrome이나 Edge를 사용해주세요.`,
      "bad"
    );
    return;
  }
  if (recognitionActive) {
    cancelListening();
    recognitionActive = false;
    setPronBtn("idle");
    return;
  }
  const word = state.queue[state.idx];
  if (!word) return;

  // Stop any TTS playback first
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (currentAudio) currentAudio.pause();

  hidePronResult();
  recognitionActive = true;
  setPronBtn("listening");

  // Safety timeout in case no speech detected
  const timeoutId = setTimeout(() => {
    if (recognitionActive) {
      cancelListening();
      recognitionActive = false;
      setPronBtn("idle");
      showPronResult(`<span class="big">🤔</span>소리를 잡지 못했어요. 다시 시도해보세요`, "bad");
    }
  }, 8000);

  listenWith("en-US", (alts, err) => {
    clearTimeout(timeoutId);
    recognitionActive = false;
    setPronBtn("idle");
    if (err) {
      let msg = "오류가 발생했어요";
      if (err === "not-allowed" || err === "service-not-allowed") {
        msg = "마이크 권한을 허용해주세요 🎤";
      } else if (err === "no-support") {
        msg = "브라우저가 음성 인식을 지원하지 않아요";
      }
      showPronResult(`<span class="big">⚠️</span>${msg}`, "bad");
      return;
    }
    if (!alts || alts.length === 0) {
      showPronResult(`<span class="big">🤔</span>들린 게 없어요`, "bad");
      return;
    }
    let best = null;
    const target = word.en;
    for (const alt of alts) {

function gradeRank(level) {
  return { perfect: 4, good: 3, close: 2, bad: 1 }[level] || 0;
}

  // If already listening, cancel

  }

  // Stop any TTS playback first

      recognitionActive = false;
      setAnswerMic(false);
      showVoiceStatus("🤔 소리를 잡지 못했어요", true);
    }
  }, 8000);

  listenWith("ko-KR", (alts, err) => {
    clearTimeout(timeoutId);
    recognitionActive = false;
    setAnswerMic(false);
    if (err) {
      let msg = "오류";
      if (err === "not-allowed" || err === "service-not-allowed") {
        msg = "⚠️ 마이크 권한을 허용해주세요";
      } else if (err === "no-support") {
        msg = "⚠️ 브라우저 미지원";
      } else if (err === "network") {
        msg = "⚠️ 네트워크 오류";
      } else if (err === "audio-capture") {
        msg = "⚠️ 마이크를 찾을 수 없어요";
      } else if (err === "language-not-supported") {
        msg = "⚠️ 한국어 인식 미지원";
      }
      showVoiceStatus(msg, true);
      return;
    }
    if (!alts || alts.length === 0) {
      showVoiceStatus("🤔 들린 말이 없어요", true);
      return;
    }
    // Pick the alternative that best matches the answer
    const word = state.queue[state.idx];
    let bestTranscript = alts[0].transcript;
    if (word) {
      for (const alt of alts) {
        if (checkAnswer(alt.transcript, word.ko)) {
          bestTranscript = alt.transcript;
          break;
        }
      }
    }
    document.getElementById("answer").value = bestTranscript;
    showVoiceStatus(`들린 말: "${bestTranscript}"`, false);
    setTimeout(() => { if (!state.feedback) submit(); }, 500);
  });
}

const MISTAKES_CHAPTER_ID = "__mistakes__";

function renderChapterGrid() {
  const grid = document.getElementById("chapter-grid");
  grid.innerHTML = "";

  // Special "frequently wrong" card — always visible
  const wrongWords = getWrongWords();
  const wrongCount = wrongWords.length;
  const specialCard = document.createElement("button");
  specialCard.className = "chapter-card special-card";
  if (wrongCount === 0) specialCard.classList.add("disabled");
  if (state.selectedChapterIds.has(MISTAKES_CHAPTER_ID) && wrongCount > 0) {
    specialCard.classList.add("selected");
  }
  specialCard.innerHTML = `
    ${wrongCount > 0 ? '<div class="reset-x" title="오답 기록 초기화">×</div>' : ''}
    <div class="check">${state.selectedChapterIds.has(MISTAKES_CHAPTER_ID) && wrongCount > 0 ? "✓" : ""}</div>
    <div class="ch-title">🔥 자주 틀린 단어</div>
    <div class="ch-count">${wrongCount === 0 ? "아직 없음" : wrongCount + "개 단어"}</div>
  `;
  specialCard.addEventListener("click", (e) => {
    if (wrongCount === 0) return;
    // X button → clear mistakes
    if (e.target.classList.contains("reset-x")) {
      e.stopPropagation();
      if (confirm("오답 기록을 모두 초기화할까요?\n(지금까지 틀린 단어 데이터가 삭제됩니다)")) {
        clearMistakes();
        state.selectedChapterIds.delete(MISTAKES_CHAPTER_ID);
        renderChapterGrid();
        updateSelectedCount();
      }
      return;
    }
    if (state.selectedChapterIds.has(MISTAKES_CHAPTER_ID)) {
      state.selectedChapterIds.delete(MISTAKES_CHAPTER_ID);
    } else {
      state.selectedChapterIds.add(MISTAKES_CHAPTER_ID);
    }
    renderChapterGrid();
    updateSelectedCount();
  });
  grid.appendChild(specialCard);

  CHAPTERS.forEach(ch => {
    const card = document.createElement("button");
    card.className = "chapter-card";
    if (state.selectedChapterIds.has(ch.id)) card.classList.add("selected");
    card.innerHTML = `
      <div class="check">${state.selectedChapterIds.has(ch.id) ? "✓" : ""}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-count">${ch.words.length}개 단어</div>
    `;
    card.addEventListener("click", () => {
      if (state.selectedChapterIds.has(ch.id)) state.selectedChapterIds.delete(ch.id);
      else state.selectedChapterIds.add(ch.id);
      renderChapterGrid();
      updateSelectedCount();
    });
    grid.appendChild(card);
  });
}
function updateSelectedCount() {
  let total = 0;
  if (state.selectedChapterIds.has(MISTAKES_CHAPTER_ID)) {
    total += getWrongWords().length;
  }
  CHAPTERS
    .filter(c => state.selectedChapterIds.has(c.id))
    .forEach(c => total += c.words.length);
  document.getElementById("selected-count").textContent =
    total === 0 ? "챕터를 선택해주세요" : `${total}개 단어 선택됨`;
  document.getElementById("start-btn").disabled = total === 0;
}
document.getElementById("select-all-btn").addEventListener("click", () => {
  CHAPTERS.forEach(c => state.selectedChapterIds.add(c.id));
  renderChapterGrid(); updateSelectedCount();
});
document.getElementById("clear-all-btn").addEventListener("click", () => {
  state.selectedChapterIds.clear();
  renderChapterGrid(); updateSelectedCount();
});

// ═══════════════════════════════════════════════════════════════════════════
// Quiz flow
// ═══════════════════════════════════════════════════════════════════════════
function getSelectedWords() {
  const seen = new Set();
  const words = [];
  // Mistake words come first if selected
  if (state.selectedChapterIds.has(MISTAKES_CHAPTER_ID)) {
    getWrongWords().forEach(w => {
      const key = w.en.toLowerCase();
      if (!seen.has(key)) { seen.add(key); words.push(w); }
    });
  }
  CHAPTERS
    .filter(c => state.selectedChapterIds.has(c.id))
    .forEach(c => c.words.forEach(w => {
      const key = w.en.toLowerCase();
      if (!seen.has(key)) { seen.add(key); words.push(w); }
    }));
  return words;
}

function startQuiz() {
  const words = getSelectedWords();
  if (words.length === 0) return;
  state.queue = shuffle(words);
  state.idx = 0; state.feedback = null;
  state.wrongs = new Set();
  state.correct = 0; state.attempts = 0; state.round = 1;
  show("quiz");
  render();
  speak(state.queue[0].en);
}

function render() {
  const word = state.queue[state.idx];
  if (!word) return;
  document.getElementById("round-chip").textContent = `R${state.round}`;
  document.getElementById("correct-chip").textContent = `✓ ${state.correct}`;
  document.getElementById("pos").textContent = state.idx + 1;
  document.getElementById("qtotal").textContent = state.queue.length;
  document.getElementById("bar").style.width = `${(state.idx / state.queue.length) * 100}%`;

  const wordEl = document.getElementById("word");
  wordEl.textContent = word.en;
  wordEl.classList.remove("long", "vlong");
  if (word.en.length > 22) wordEl.classList.add("vlong");
  else if (word.en.length > 14) wordEl.classList.add("long");

  document.getElementById("s-attempts").textContent = state.attempts;
  document.getElementById("s-correct").textContent = state.correct;
  document.getElementById("s-wrong").textContent = state.attempts - state.correct;

  const card = document.getElementById("card");
  const inputArea = document.getElementById("input-area");
  const fbArea = document.getElementById("feedback-area");
  card.classList.remove("ok", "ng");

  if (!state.feedback) {
    hidePronResult();
    // Enable/disable pron button based on support
    const pronBtn = document.getElementById("pron-btn");
    if (!supportsPronunciationTest()) {
      pronBtn.style.display = "none";
    }
    // Hide Korean answer mic if unsupported
    const answerMic = document.getElementById("answer-mic");
    if (!SpeechRec) answerMic.style.display = "none";
    // Hide any stale voice status
    const vs = document.getElementById("voice-status");
    if (vs) vs.classList.add("hidden");
    inputArea.classList.remove("hidden");
    fbArea.classList.add("hidden");
    document.getElementById("answer").value = "";
    setTimeout(() => document.getElementById("answer").focus(), 100);
  } else {
    inputArea.classList.add("hidden");
    fbArea.classList.remove("hidden");
    card.classList.add(state.feedback);
    const isLast = state.idx + 1 >= state.queue.length;
    const nextText = isLast ? "결과 보기 →" : "다음 →";
    if (state.feedback === "ok") {
      fbArea.innerHTML = `
        <div style="animation: pop .3s ease">
          <div class="feedback-icon">🎉</div>
          <div class="feedback-title ok">정답!</div>
          <div class="feedback-answer ok">${word.ko[0]}</div>
          <button class="btn-outline" style="color:#81c784" id="next-btn">${nextText}</button>
        </div>`;
    } else {
      fbArea.innerHTML = `
        <div style="animation: shake .4s ease">
          <div class="feedback-icon">😅</div>
          <div class="feedback-title ng">틀렸어요! 정답:</div>
          <div class="feedback-answer">${word.ko.join(" / ")}</div>
          <div class="feedback-note">다음 라운드에 다시 나옵니다</div>
          <button class="btn-outline" style="color:#e57373" id="next-btn">${nextText}</button>
        </div>`;
    }
    document.getElementById("next-btn").addEventListener("click", nextQuestion);
  }
}

function submit() {
  if (state.feedback) return;
  const input = document.getElementById("answer").value;
  if (!input.trim()) return;
  const word = state.queue[state.idx];
  const ok = checkAnswer(input.trim(), word.ko);
  state.attempts++;
  recordResult(word.en, ok);
  if (ok) { state.correct++; state.feedback = "ok"; try { playCorrectSound(); } catch(e){} }
  else { state.wrongs.add(word.en); state.feedback = "ng"; try { playWrongSound(); } catch(e){} }
  render();
}

function nextQuestion() {
  const nextIdx = state.idx + 1;
  if (nextIdx >= state.queue.length) {
    const wrongWords = state.queue.filter(w => state.wrongs.has(w.en));
    if (wrongWords.length === 0) { showDone(); return; }
    state.queue = shuffle(wrongWords);
    state.wrongs = new Set();
    state.idx = 0;
    state.round++;
    state.feedback = null;
  } else {
    state.idx = nextIdx;
    state.feedback = null;
  }
  render();
  speak(state.queue[state.idx].en);
}

function showDone() {
  const accuracy = Math.round(state.correct / Math.max(state.attempts, 1) * 100);
  const items = [
    ["총 시도", state.attempts + "회", "#8899aa"],
    ["정답", state.correct + "개", "#81c784"],
    ["라운드", state.round + "R", "#FFB703"],
    ["정확도", accuracy + "%", "#64b5f6"],
  ];
  document.getElementById("done-stats").innerHTML = items.map(([l, v, c]) =>
    `<div class="done-stat"><div class="n" style="color:${c}">${v}</div><div class="l">${l}</div></div>`
  ).join("");
  show("done");
  try { playFanfare(); } catch(e) {}
}

function goHome() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (currentAudio) currentAudio.pause();
  // Fully shut down persistent recognition (allows tab mic indicator to turn off)
  recognitionActive = false;
  cancelListening();
  if (_persistentRec) {
    const rec = _persistentRec;
    _persistentRec = null; // Prevent onend auto-restart
    try { rec.stop(); } catch (e) {}
    try { rec.abort(); } catch (e) {}
  }
  // Release mic stream (turns off the mic indicator in browser tab)
  releaseMic();
  // Refresh wrong-words list when returning home (may have new mistakes)
  renderChapterGrid();
  updateSelectedCount();
  show("intro");
}

// ═══════════════════════════════════════════════════════════════════════════
// Event listeners
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById("start-btn").addEventListener("click", startQuiz);
document.getElementById("restart-btn").addEventListener("click", startQuiz);
document.getElementById("submit-btn").addEventListener("click", submit);
document.getElementById("home-btn").addEventListener("click", goHome);
document.getElementById("home-btn-2").addEventListener("click", goHome);
document.getElementById("answer").addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
document.getElementById("speaker").addEventListener("click", () => {
  const word = state.queue[state.idx];
  if (word) speak(word.en);
});
document.getElementById("pron-btn").addEventListener("click", startPronunciationTest);
document.getElementById("answer-mic").addEventListener("click", startKoreanAnswer);
document.getElementById("test-voice").addEventListener("click", () => {
  speak("Hello! This is a test of the English voice.");
});

// Preselect Ch. 17-18 for first-time users
state.selectedChapterIds.add("ch17-18");
renderChapterGrid();
updateSelectedCount();

// ═══════════════════════════════════════════════════════════════════════════
// Mic support notice (adapts to browser/protocol/platform)
// ═══════════════════════════════════════════════════════════════════════════
function setupMicNotice() {
  const notice = document.getElementById("mic-notice");
  if (!notice) return;

  const isFile = window.location.protocol === "file:";
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isSecure = window.isSecureContext;
  const hasSpeechRec = !!SpeechRec;

  if (hasSpeechRec && isSecure) {
    // Everything works
    notice.className = "mic-notice ok";
    notice.innerHTML = `
      💡 <b>🎤 버튼을 처음 누르면 마이크 권한을 허용해주세요.</b><br>
      퀴즈 중엔 탭에 마이크 아이콘이 계속 켜져 있어요 (권한 유지용).
    `;
    notice.classList.remove("hidden");
    return;
  }

  if (!hasSpeechRec && isMobile && isFile) {
    // Mobile + file:// — the common blocker
    notice.className = "mic-notice warn";
    notice.innerHTML = `
      ⚠️ <b>모바일에서 음성 인식이 차단됐어요.</b><br>
      안드로이드 Chrome은 <code>file://</code> 로 열린 파일에서는 보안상 마이크 접근을 허용하지 않아요.<br>
      키보드로는 계속 퀴즈를 풀 수 있어요.
      <details>
        <summary>🔧 모바일에서 음성 인식 켜는 방법</summary>
        <div class="steps">
          <b>가장 쉬운 방법 — Netlify Drop (30초):</b><br>
          1. PC에서 <a href="https://app.netlify.com/drop" target="_blank">app.netlify.com/drop</a> 열기<br>
          2. 이 HTML 파일을 페이지에 드래그<br>
          3. 받은 <code>https://...netlify.app</code> 주소를 모바일 Chrome으로 접속<br>
          4. 이제 🎤 가 작동해요! (계정 필요 없음)<br><br>
          <b>또는 — GitHub Pages:</b><br>
          GitHub 저장소에 파일 업로드 → Settings → Pages 활성화 → HTTPS URL로 접속
        </div>
      </details>
    `;
    notice.classList.remove("hidden");
    return;
  }

  if (!hasSpeechRec) {
    // Other unsupported cases
    notice.className = "mic-notice warn";
    notice.innerHTML = `
      ⚠️ <b>이 브라우저는 음성 인식을 지원하지 않아요.</b><br>
      Chrome 또는 Edge 사용을 권장해요 (Firefox는 미지원).<br>
      키보드로는 계속 퀴즈를 풀 수 있어요.
    `;
    notice.classList.remove("hidden");
    return;
  }

  if (!isSecure && isFile) {
    // Desktop file:// - works but with extra prompts
    notice.className = "mic-notice warn";
    notice.innerHTML = `
      ⚠️ <b>로컬 파일(<code>file://</code>)로 여셨네요.</b><br>
      Chrome이 매번 마이크 권한을 물어볼 수 있어요.
      <details>
        <summary>🔧 해결 방법 (프롬프트 한 번만 나오게)</summary>
        <div class="steps">
          <b>옵션 1 — Netlify Drop (가장 쉬움):</b><br>
          <a href="https://app.netlify.com/drop" target="_blank">app.netlify.com/drop</a> 에 이 파일 드래그 → HTTPS URL로 접속<br><br>
          <b>옵션 2 — 로컬 서버 (PC에 Python이 있을 때):</b><br>
          터미널에서 <code>python -m http.server 8000</code> 실행 후
          <code>http://localhost:8000</code> 접속
        </div>
      </details>
    `;
    notice.classList.remove("hidden");
    return;
  }
}
setupMicNotice();

if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
  setTimeout(loadVoices, 300);
}
</script>
